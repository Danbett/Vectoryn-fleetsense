# ── Vectoryn FleetSense — NGINX routing ─────────────────────────────────────
# IP-only for now. When domain arrives:
#   website:  vectorynfleetsense.com   → /usr/share/nginx/website
#   platform: app.vectorynfleetsense.com → /usr/share/nginx/app + /api proxy

server {
    listen 80;
    server_name _;

    # ── Marketing website → /  ───────────────────────────────────────────────
    location / {
        root /usr/share/nginx/website;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── FleetSense platform SPA → /app/  ────────────────────────────────────
    location /app/ {
        alias /usr/share/nginx/app/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
    }

    # ── Spring Boot API → /api/  ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';

        # SSE support (real-time telemetry stream)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        return 200 'Vectoryn FleetSense — OK\n';
        add_header Content-Type text/plain;
    }
}
