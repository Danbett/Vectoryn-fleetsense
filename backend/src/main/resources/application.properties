# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=fleetsense

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP connection pool ──────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=FleetSensePool

# ── Mail (stubbed) ────────────────────────────────────────────────────────────
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App secrets ───────────────────────────────────────────────────────────────
app.session.secret=${SESSION_SECRET}
app.apikey.salt=${API_KEY_SALT}
app.smtp.from=${SMTP_FROM}
app.timezone=${TZ:Africa/Nairobi}

# ── Scheduling ────────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=8

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.vectoryn=INFO
logging.level.org.springframework.jdbc=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

spring.datasource.hikari.connectionInitSql=SET timezone TO UTC
